services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: sentient
      POSTGRES_PASSWORD: sentient
      POSTGRES_DB: sentient
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
  api:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://sentient:sentient@db:5432/sentient
    ports: ["8000:8000"]
    depends_on: [db]
volumes:
  pgdata:
